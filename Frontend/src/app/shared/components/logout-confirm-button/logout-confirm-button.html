<button type="button" [class]="buttonClass()" (click)="openModal()">
  @if (buttonIconClass()) {
    <i [class]="buttonIconClass()"></i>
  } @else {
    {{ buttonText() }}
  }
</button>

<dialog
  #confirmDialog
  class="logout-dialog w-full max-w-md rounded-2xl border-none bg-white p-6 shadow-xl"
  (click)="onDialogClick($event)"
  (cancel)="closeModal()"
>
  <h3 class="font-heading text-xl font-bold text-charcoal">{{ modalTitle() }}</h3>
  <p class="mt-3 text-sm leading-6 text-muted">{{ modalMessage() }}</p>
  <div class="mt-6 flex justify-end gap-3">
    <button
      type="button"
      (click)="closeModal()"
      class="rounded-full border border-border bg-white px-4 py-2 font-heading text-sm font-semibold text-charcoal transition hover:border-sky"
    >
      {{ cancelText() }}
    </button>
    <button
      type="button"
      (click)="confirmLogout()"
      class="rounded-full bg-blue px-4 py-2 font-heading text-sm font-semibold text-white transition hover:bg-blueDark"
    >
      {{ confirmText() }}
    </button>
  </div>
</dialog>
