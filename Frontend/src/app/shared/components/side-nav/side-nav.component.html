<div class="flex h-full flex-col justify-between bg-white border-r border-border">
  <div class="space-y-5 p-4">
    <div class="relative">
      <i class="mdi mdi-magnify absolute left-3 top-1/2 -translate-y-1/2 text-muted text-base"></i>
      <input
        type="text"
        placeholder="Buscar usuarios"
        class="w-full rounded-2xl border border-border bg-ice px-10 py-2 text-sm text-brand-text placeholder:text-muted focus:outline-none focus:ring-2 focus:ring-blue/30"
      />
    </div>

    <nav class="space-y-3">
      <a
        routerLink="/app/feed"
        routerLinkActive="bg-ice text-primary-dark"
        class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium text-brand-text transition-colors hover:bg-ice"
      >
        <i class="mdi mdi-home-outline text-lg"></i>
        Feed
      </a>

      <a
        routerLink="/app/routines"
        routerLinkActive="bg-ice text-primary-dark"
        class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium text-brand-text transition-colors hover:bg-ice"
      >
        <i class="mdi mdi-dumbbell text-lg"></i>
        Rutinas
      </a>

      <a
        routerLink="/app/profile"
        routerLinkActive="bg-ice text-primary-dark"
        class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium text-brand-text transition-colors hover:bg-ice"
      >
        <i class="mdi mdi-account-outline text-lg"></i>
        Perfil
      </a>
    </nav>
  </div>

  <div class="border-t border-border p-4">
    <div class="flex items-center gap-3">
      <div class="flex h-10 w-10 items-center justify-center rounded-full bg-primary-dark text-sm font-bold text-white font-heading">
        {{ avatarLetter() }}
      </div>
      <div class="min-w-0 flex-1">
        <p class="truncate font-heading text-sm font-semibold text-brand-text">{{ username() }}</p>
      </div>
    </div>

    <div class="mt-3 flex justify-end">
      <app-logout-confirm-button buttonClass="rounded-full bg-ice px-3 py-2 font-heading text-xs font-semibold text-brand-blue hover:bg-ice" />
    </div>
  </div>
</div>
