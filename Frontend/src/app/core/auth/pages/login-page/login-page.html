<app-auth-card mode="login">
  <h1 class="font-heading text-[1.6rem] font-extrabold text-navy">Bienvenido de nuevo</h1>
  <p class="mb-8 mt-1 text-sm text-silver">Inicia sesion en tu cuenta DumbellCheck</p>

  <form class="space-y-4" [formGroup]="form" (ngSubmit)="submit()">
    <div>
      <label class="mb-1.5 block font-heading text-[0.82rem] font-semibold uppercase tracking-[0.04em] text-charcoal">
        Email o usuario
      </label>
      <input
        type="text"
        formControlName="principal"
        placeholder="tu@email.com"
        class="w-full rounded-[10px] border-2 border-[#e8edf2] bg-[#fafbfc] px-3.5 py-3 text-[0.95rem] text-charcoal outline-none transition focus:border-sky focus:bg-white"
      />
    </div>

    <div>
      <label class="mb-1.5 block font-heading text-[0.82rem] font-semibold uppercase tracking-[0.04em] text-charcoal">
        Contrasena
      </label>
      <input
        type="password"
        formControlName="password"
        placeholder="••••••••"
        class="w-full rounded-[10px] border-2 border-[#e8edf2] bg-[#fafbfc] px-3.5 py-3 text-[0.95rem] text-charcoal outline-none transition focus:border-sky focus:bg-white"
      />
    </div>

    <a href="#" class="block text-right text-[0.82rem] text-blue transition hover:text-navy">Olvidaste tu contrasena?</a>

    <button
      type="submit"
      [disabled]="form.invalid || submitting()"
      class="w-full rounded-[10px] bg-[linear-gradient(135deg,var(--color-blue),var(--color-navy))] px-4 py-[13px] font-heading text-base font-bold text-white transition hover:opacity-90 disabled:cursor-not-allowed disabled:opacity-50"
    >
      {{ submitting() ? 'Validando...' : 'Iniciar sesion' }}
    </button>
  </form>

  <div class="my-5 flex items-center gap-3">
    <span class="h-px flex-1 bg-[#e8edf2]"></span>
    <span class="text-[0.82rem] text-silver">o continua con</span>
    <span class="h-px flex-1 bg-[#e8edf2]"></span>
  </div>

  <button
    type="button"
    class="flex w-full items-center justify-center gap-2 rounded-[10px] border-2 border-[#e8edf2] px-3 py-[11px] font-heading text-[0.88rem] font-semibold text-charcoal transition hover:border-sky hover:bg-sky/10"
  >
    <i class="fa-brands fa-google text-base" aria-hidden="true"></i>
    Iniciar sesion con Google
  </button>

  <p *ngIf="successMessage()" class="mt-4 text-sm text-green-700">{{ successMessage() }}</p>
  <p *ngIf="errorMessage()" class="mt-4 text-sm text-red-700">{{ errorMessage() }}</p>

  <div class="mt-6 text-center text-sm text-silver">
    No tienes cuenta?
    <a routerLink="/auth/register" class="font-bold text-blue transition hover:text-navy">Create una gratis</a>
  </div>
</app-auth-card>
