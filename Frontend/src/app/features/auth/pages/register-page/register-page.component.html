<section class="rounded-2xl bg-white p-6 shadow-sm">
  <h1 class="text-2xl font-bold text-brand-text">Crear cuenta</h1>
  <p class="mt-2 text-sm text-brand-gray">Es gratis y siempre lo sera</p>

  <form class="mt-5 grid gap-3" [formGroup]="form" (ngSubmit)="submit()">
    <label class="text-xs font-semibold uppercase tracking-wide text-brand-text">Nombre</label>
    <input class="rounded-lg border p-2" type="text" placeholder="Adrian" formControlName="nombre" />

    <label class="text-xs font-semibold uppercase tracking-wide text-brand-text">Primer apellido</label>
    <input class="rounded-lg border p-2" type="text" placeholder="Gonzalez" formControlName="apellido1" />

    <label class="text-xs font-semibold uppercase tracking-wide text-brand-text">Segundo apellido</label>
    <input class="rounded-lg border p-2" type="text" placeholder="Gutierrez (opcional)" formControlName="apellido2" />

    <label class="text-xs font-semibold uppercase tracking-wide text-brand-text">Nombre de usuario</label>
    <input class="rounded-lg border p-2" type="text" placeholder="Adrian_fit" formControlName="username" />

    <label class="text-xs font-semibold uppercase tracking-wide text-brand-text">Email</label>
    <input class="rounded-lg border p-2" type="email" placeholder="Adrian@email.com" formControlName="email" />

    <label class="text-xs font-semibold uppercase tracking-wide text-brand-text">Contrasena</label>
    <input class="rounded-lg border p-2" type="password" placeholder="Minimo 8 caracteres" formControlName="password" />

    <div class="strength-bar">
      <div class="strength-fill" [style.width.%]="passwordStrength().percent"></div>
    </div>
    <p class="text-xs text-brand-gray">Fuerza: {{ passwordStrength().label }}</p>

    <label class="text-xs font-semibold uppercase tracking-wide text-brand-text">Confirmar contrasena</label>
    <input class="rounded-lg border p-2" type="password" placeholder="Repite la contrasena" formControlName="repeatPassword" />

    <p *ngIf="form.hasError('passwordsMismatch') && form.controls.repeatPassword.touched" class="text-sm text-red-700">
      Las contrasenas no coinciden.
    </p>

    <button
      class="mt-1 rounded-lg border border-blue-700 bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-50"
      type="submit"
      [disabled]="form.invalid || submitting()"
    >
      {{ submitting() ? 'Creando cuenta...' : 'Crear mi cuenta' }}
    </button>
  </form>

  <p *ngIf="successMessage()" class="mt-3 text-sm text-green-700">{{ successMessage() }}</p>
  <p *ngIf="errorMessage()" class="mt-3 text-sm text-red-700">{{ errorMessage() }}</p>

  <div class="mt-4 text-sm text-brand-gray">
    Ya tienes cuenta? <a class="text-brand-blue" routerLink="/auth/login">Inicia sesion</a>
  </div>
</section>
