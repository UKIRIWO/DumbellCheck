<!-- Backdrop -->
<div class="fixed inset-0 z-40 bg-black/40" (click)="close()"></div>

<!-- Bottom sheet panel -->
<div class="fixed bottom-0 left-1/2 -translate-x-1/2 z-50 flex flex-col rounded-t-2xl bg-surface shadow-xl max-h-[85dvh] w-full max-w-xl">

  <!-- Drag handle -->
  <div class="flex justify-center py-3">
    <div class="h-1 w-10 rounded-full bg-border"></div>
  </div>

  <!-- Filters -->
  <div class="px-4 pb-3 space-y-3">
    <!-- Grupo muscular select -->
    <div class="relative">
      <select
        class="w-full appearance-none rounded-xl border border-border bg-ice px-4 py-3 pr-10 text-sm text-brand-text focus:outline-none focus:ring-2 focus:ring-primary-dark"
        [(ngModel)]="selectedGrupoId"
        (change)="onGrupoChange()"
      >
        <option [ngValue]="undefined">Todos los músculos</option>
        @for (g of grupos(); track g.id) {
          <option [ngValue]="g.id">{{ g.nombre }}</option>
        }
      </select>
      <i class="mdi mdi-chevron-down pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-lg text-muted"></i>
    </div>

    <!-- Search input -->
    <div class="relative">
      <i class="mdi mdi-magnify absolute left-3 top-1/2 -translate-y-1/2 text-lg text-muted"></i>
      <input
        class="w-full rounded-xl border border-border bg-ice py-3 pl-10 pr-4 text-sm text-brand-text placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary-dark"
        type="text"
        placeholder="Buscar ejercicios"
        [(ngModel)]="searchQuery"
        (ngModelChange)="onSearchChange()"
      />
    </div>
  </div>

  <!-- Exercise list -->
  <div class="flex-1 overflow-y-auto px-4 pb-6">
    @if (loading()) {
      <div class="flex justify-center py-8">
        <i class="mdi mdi-loading mdi-spin text-3xl text-primary-dark"></i>
      </div>
    } @else if (ejercicios().length === 0) {
      <div class="flex flex-col items-center gap-2 py-10 text-center">
        <i class="mdi mdi-magnify-remove-outline text-4xl text-border"></i>
        <p class="text-sm text-muted">No se encontraron ejercicios</p>
      </div>
    } @else {
      <p class="mb-3 text-xs font-semibold uppercase tracking-wide text-muted">
        {{ searchQuery ? 'Resultados' : 'Ejercicios populares' }}
      </p>
      <ul class="space-y-1">
        @for (ej of ejercicios(); track ej.id) {
          <li class="flex items-center gap-3 rounded-xl p-3 hover:bg-ice transition-colors">
            @if (ej.imagenUrl) {
              <img [src]="ej.imagenUrl" [alt]="ej.nombre" class="h-12 w-12 rounded-full object-cover bg-ice shrink-0" />
            } @else {
              <div class="h-12 w-12 rounded-full bg-ice flex items-center justify-center shrink-0">
                <i class="mdi mdi-dumbbell text-2xl text-muted"></i>
              </div>
            }
            <div class="flex-1 min-w-0">
              <p class="text-sm font-semibold text-brand-text truncate">{{ ej.nombre }}</p>
            </div>
            <button
              class="flex h-8 w-8 items-center justify-center rounded-full bg-brand-blue text-white shrink-0 hover:bg-blueDark transition-colors"
              type="button"
              (click)="select(ej)"
              [attr.aria-label]="'Añadir ' + ej.nombre"
            >
              <i class="mdi mdi-plus text-lg"></i>
            </button>
          </li>
        }
      </ul>
    }
  </div>
</div>
