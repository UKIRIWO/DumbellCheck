<section id="features" class="bg-white px-6 py-24">
  <div class="mx-auto w-full max-w-[1200px]">
    <span class="mb-3 inline-block font-heading text-xs font-semibold uppercase tracking-[0.1em] text-blue">
      Que puedes hacer?
    </span>
    <h2 class="mb-4 font-heading text-4xl font-bold text-charcoal">Todo lo que necesitas para tu entrenamiento</h2>
    <p class="max-w-[560px] text-lg text-muted">
      Desde registrar cada serie hasta ver los avances de la comunidad, DumbellCheck lo tiene todo.
    </p>

    <div class="mt-14 grid grid-cols-1 gap-6 md:grid-cols-2 xl:grid-cols-3">
      <app-landing-feature-card
        icon="mdi mdi-dumbbell"
        title="Publica rutinas"
        description="Comparte cada entrenamiento con ejercicios, series, repeticiones, pesos y tiempos de descanso detallados."
      />
      <app-landing-feature-card
        icon="mdi mdi-chart-line"
        title="Estadisticas personales"
        description="Visualiza tu progreso con graficas interactivas. Filtra por periodo y descarga informes en PDF."
      />
      <app-landing-feature-card
        icon="mdi mdi-account-group"
        title="Red social"
        description="Sigue a otros atletas, da likes, comenta sus publicaciones y descubre nuevas rutinas en la seccion Descubrir."
      />
      <app-landing-feature-card
        icon="mdi mdi-chat-processing-outline"
        title="Mensajes privados"
        description="Chatea directamente con cualquier usuario. Envia imagenes, videos y mensajes en tiempo real."
      />
      <app-landing-feature-card
        icon="mdi mdi-clipboard-text-outline"
        title="Plantillas de entreno"
        description="Crea plantillas para tus dias de pecho, pierna y espalda para rellenar publicaciones en segundos."
      />
      <app-landing-feature-card
        icon="mdi mdi-bell-ring-outline"
        title="Notificaciones"
        description="Recibe alertas de nuevos seguidores, comentarios, likes y publicaciones de quienes mas te interesan."
      />
    </div>
  </div>
</section>
