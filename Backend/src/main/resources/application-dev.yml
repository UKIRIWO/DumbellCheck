spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/dumbellcheck?useSSL=false&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
    show-sql: true

app:
  security:
    jwt-secret: ${JWT_SECRET:cmVwbGFjZV9tZV93aXRoX2xvbmdfYmFzZTY0X3NlY3JldA==}
    jwt-expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://www.dumbellcheck.com}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/google/callback}
    auth-uri: ${GOOGLE_AUTH_URI:https://accounts.google.com/o/oauth2/v2/auth}
    token-uri: ${GOOGLE_TOKEN_URI:https://oauth2.googleapis.com/token}
    user-info-uri: ${GOOGLE_USER_INFO_URI:https://openidconnect.googleapis.com/v1/userinfo}
    scope: ${GOOGLE_SCOPE:openid profile email}
    frontend-success-uri: ${GOOGLE_FRONTEND_SUCCESS_URI:http://localhost:4200/auth/google/callback}
    frontend-error-uri: ${GOOGLE_FRONTEND_ERROR_URI:http://localhost:4200/auth/login}
    secure-state-cookie: ${GOOGLE_SECURE_STATE_COOKIE:false}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

management:
  endpoint:
    health:
      show-details: always
