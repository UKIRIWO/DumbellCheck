spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/dumbellcheck?useSSL=false&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
    show-sql: true

app:
  security:
    jwt-secret: ${JWT_SECRET:cmVwbGFjZV9tZV93aXRoX2xvbmdfYmFzZTY0X3NlY3JldA==}
    jwt-expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://www.dumbellcheck.com}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

management:
  endpoint:
    health:
      show-details: always
